<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 400px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 15px; }
        h1 { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; }
        .log-container { max-height: 400px; overflow-y: auto; background: #f4f4f4; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .log-item { border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-bottom: 8px; font-size: 12px; }
        .log-item:last-child { border-bottom: none; margin-bottom: 0; }
        .type { font-weight: bold; color: #d00; display: block; margin-bottom: 2px; }
        .message { color: #555; }
        .timestamp { color: #999; font-size: 10px; display: block; margin-top: 4px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 15px; width: 100%; text-align: center; }
        .status-safe { background: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
        .status-danger { background: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
        .btn-clear { background: #eee; border: 1px solid #ccc; color: #333; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; float: right; margin-top: -35px; }
        .btn-clear:hover { background: #ddd; }
    </style>
</head>
<body>
    <h1>🛡️ Affiliate Auditor 🛡️</h1>
    <div id="status" class="status-badge status-safe">NO THREATS DETECTED</div>
    <button id="clearLog" class="btn-clear">Clear Log</button>
    
    <div class="log-container" id="logContainer">
        <div class="log-item"><span class="message">Waiting for activity... Visit your store to audit.</span></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
