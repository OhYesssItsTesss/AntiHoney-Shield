<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 400px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 15px; background: #fafafa; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        h1 { font-size: 18px; margin: 0; color: #2c3e50; }
        .log-container { max-height: 400px; overflow-y: auto; background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .log-item { border-bottom: 1px solid #f0f0f0; padding: 10px 0; font-size: 12px; }
        .log-item:last-child { border-bottom: none; }
        .type { font-weight: bold; color: #e74c3c; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .message { color: #34495e; line-height: 1.4; }
        .timestamp { color: #bdc3c7; font-size: 10px; display: block; margin-top: 6px; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 20px; width: 100%; text-align: center; transition: all 0.3s ease; }
        .status-safe { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-danger { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .footer-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-clear { background: #f0f0f0; color: #7f8c8d; }
        .btn-clear:hover { background: #e0e0e0; }
        .btn-share { background: #2ecc71; color: white; }
        .btn-share:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Affiliate Auditor</h1>
    </div>
    
    <div id="status" class="status-badge status-safe">PROTECTED: NO THREATS</div>
    
    <div class="log-container" id="logContainer">
        <div class="log-item"><span class="message">System Active. Visit your store to audit.</span></div>
    </div>

    <div class="footer-btns">
        <button id="clearLog" class="btn btn-clear">Clear Logs</button>
        <button id="shareShield" class="btn btn-share">Share the Shield</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
