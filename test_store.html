<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Store: Checkout Test</title>
    
    <!-- 🛡️ LOAD THE VOID SHELL (The Shield) -->
    <script src="void_shell.js"></script>
    
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .promo-box { background: #f9f9f9; padding: 20px; border-radius: 5px; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .log { margin-top: 20px; font-family: monospace; font-size: 12px; color: #666; background: #eee; padding: 10px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>🛒 Your Cart</h1>
    <div class="item">
        <span>Austin Neuromorphic Node (Pi 5 + Hailo-10H)</span>
        <span>$130.00</span>
    </div>

    <div class="promo-box">
        <h3>Have a promo code?</h3>
        <!-- This is the target for Honey/extensions -->
        <input type="text" id="coupon-code" name="promo_code" placeholder="Enter code here...">
        <button id="apply-btn">Apply</button>
    </div>

    <div id="debug-log" class="log">
        [System] Monitoring for hijack attempts...<br>
    </div>

    <script>
        const logBox = document.getElementById('debug-log');
        function log(msg) {
            logBox.innerHTML += `> ${msg}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Simulate a checkout button
        document.getElementById('apply-btn').onclick = () => {
            const code = document.getElementById('coupon-code').value;
            log(`Applied code: ${code}`);
        };

        // Monitor cookies in the UI for the test
        setInterval(() => {
            if (document.cookie.includes('honey') || document.cookie.includes('rakuten')) {
                log(`<span style="color:red">HIJACK COOKIE DETECTED: ${document.cookie}</span>`);
            }
        }, 2000);
    </script>
</body>
</html>
